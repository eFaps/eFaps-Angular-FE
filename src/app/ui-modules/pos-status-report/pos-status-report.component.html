<div class="wrapper">
  @if (report()) {
    <div class="header">
      <div class="title">
        <h2>Estatus</h2>
        <span>Ultima evaluacion: {{ report()?.date | date: "medium" }}</span>
      </div>
      <div class="size">
        <p-button icon="pi pi-arrows-alt" (click)="op.toggle($event)" />
        <p-popover #op>
          <div class="flex sizePopover">
            <div>
              <i class="pi pi-arrows-v"></i>
              <p-slider [(ngModel)]="height" [min]="7" [max]="20" [step]="0.5" />
            </div>
            <div>
              <i class="pi pi-arrows-h"></i>
              <p-slider [(ngModel)]="width" [min]="10" [max]="30" [step]="0.5" />
            </div>
          </div>
        </p-popover>
      </div>
      <div class="timeframe">
        <p-floatlabel>
          <p-select
            [options]="timeFrames"
            [(ngModel)]="selectedTimeFrame"
            [checkmark]="true"
            inputId="timeFrame"
            fluid />
          <label for="timeFrame">Actualización automática</label>
        </p-floatlabel>
        @if (counter() > 0) {
          <span class="counter">{{ counter() }}s</span>
        }
      </div>
    </div>

    <div class="statusWrapper">
      @for (status of report()?.backendStatus; track status) {
        <div class="status" [style.width]="width() + 'rem'" [style.height]="height() + 'rem'">
          <span class="name" (click)="navigate(status.oid)"> {{ status.name }} </span>
          <span>{{ status.timeAgo }}</span>

          @switch (status.status) {
            @case (3) {
              <span class="statusOk">
                <i class="pi pi-thumbs-up" style="font-size: 2.5rem"></i>
              </span>
            }
            @case (2) {
              <span class="statusWarning">
                <i class="pi pi-exclamation-triangle" style="font-size: 2.5rem"></i>
              </span>
            }
            @case (1) {
              <span class="statusUnknown">
                <i class="pi pi-exclamation-triangle" style="font-size: 2.5rem"></i>
              </span>
            }
          }
        </div>
      }
    </div>
  }
</div>
